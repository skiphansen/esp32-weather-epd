; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
;default_envs = dfrobot_firebeetle2_esp32e
; default_envs = firebeetle32
default_envs = photo_painter

; default options for each '[env:**]'
[env]
platform = espressif32 @ 6.13.0
framework = arduino
build_unflags = '-std=gnu++11'
build_flags = '-Wall' '-std=gnu++17'
lib_deps =
  adafruit/Adafruit BME280 Library @ 2.3.0
  adafruit/Adafruit BME680 Library @ 2.0.6
  adafruit/Adafruit BusIO @ 1.17.4
  adafruit/Adafruit Unified Sensor @ 1.1.15
  bblanchon/ArduinoJson @ 7.4.3
  zinggjm/GxEPD2 @ 1.6.8


[env:dfrobot_firebeetle2_esp32e]
board = dfrobot_firebeetle2_esp32e
monitor_speed = 115200
; override default partition table
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
board_build.partitions = huge_app.csv
; change MCU frequency, 240MHz -> 80MHz (for better power efficiency)
board_build.f_cpu = 80000000L
lib_deps =
  ${env.lib_deps}
  adafruit/Adafruit BME280 Library @ 2.3.0
  adafruit/Adafruit BME680 Library @ 2.0.5


[env:firebeetle32]
board = firebeetle32
monitor_speed = 115200
; override default partition table
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
board_build.partitions = huge_app.csv
; change MCU frequency, 240MHz -> 80MHz (for better power efficiency)
board_build.f_cpu = 80000000L

[env:photo_painter]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip

board_build.filesystem = littlefs
board = esp32-s3-devkitc-1
board_build.partitions = default_16MB.csv
board_build.flash_mode=qio
board_build.arduino.memory_type = qio_opi
board_build.psram_type=qspi_opi
board_upload.maximum_size = 16777216
board_upload.maximum_ram_size = 327680
board_upload.flash_size = 16MB
monitor_speed = 115200

; change MCU frequency, 240MHz -> 80MHz (for better power efficiency)
;board_build.f_cpu = 80000000L
build_flags =
  -DTARGET_ESP32
  -DTARGET_LARGE_MEMORY
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DPHOTO_PAINTER
  -DCONFIG_FREERTOS_WATCHDOG_TIMEOUT_S=120

lib_deps =
    ${env.lib_deps}
   adafruit/Adafruit SHTC3 Library @ 1.0.2
   lewisxhe/XPowersLib

